name: Codex-Review-Bot

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    name: review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Codex provider
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.codex-home"
          cat > "$GITHUB_WORKSPACE/.codex-home/config.toml" <<EOF
          model = "codex-auto-review"
          model_provider = "third_party"

          [model_providers.third_party]
          name = "Third party OpenAI-compatible provider"
          base_url = "$OPENAI_BASE_URL"
          env_key = "OPENAI_API_KEY"
          EOF

      - name: Install Codex CLI
        run: |
          curl -fsSL https://chatgpt.com/codex/install.sh | CODEX_NON_INTERACTIVE=1 sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Codex review
        id: codex
        env:
          CODEX_HOME: ${{ github.workspace }}/.codex-home
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          codex exec --ephemeral --sandbox read-only --model codex-auto-review -o codex-review.md "$(cat .github/codex/prompts/review.md)"
          {
            echo 'final-message<<EOF'
            cat codex-review.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post Codex review comment
        if: steps.codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

      - name: Fail on blocking review result
        if: "${{ contains(steps.codex.outputs.final-message, 'RESULT: FAIL') }}"
        run: exit 1
