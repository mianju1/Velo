name: Codex-Review-Bot

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    name: review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Codex provider
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.codex-home"
          cat > "$GITHUB_WORKSPACE/.codex-home/config.toml" <<'EOF'
          model = "codex-auto-review"
          openai_base_url = "${{ secrets.OPENAI_BASE_URL }}"
          EOF

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-review.md
          sandbox: read-only
          codex-home: ${{ github.workspace }}/.codex-home

      - name: Post Codex review comment
        if: steps.codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

      - name: Fail on blocking review result
        if: "${{ contains(steps.codex.outputs.final-message, 'RESULT: FAIL') }}"
        run: exit 1
