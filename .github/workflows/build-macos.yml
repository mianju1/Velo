name: Build macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-macos-arm64:
    name: macOS arm64 embedded libmpv package
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      VELO_MACOS_MIN_VERSION: "14.0"
      MACOS_NOTARIZE: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && '1' || '0' }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY || '-' }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Import Developer ID certificate
        if: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' }}
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD || github.run_id }}
        run: |
          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"

          echo "${MACOS_CERTIFICATE_P12}" | base64 --decode > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" \
            -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

      - name: Install libmpv
        run: |
          brew update
          brew install mpv

      - name: Install dependencies
        run: npm ci

      - name: Verify package targets
        run: npm test -- --run src-tauri/package-targets.test.ts

      - name: Run Rust tests
        run: cargo test --lib
        working-directory: src-tauri

      - name: Build notarized macOS package
        if: ${{ env.MACOS_NOTARIZE == '1' }}
        run: npm run package:macos:release

      - name: Build local macOS package
        if: ${{ env.MACOS_NOTARIZE != '1' }}
        run: npm run package:macos:local

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: velo-macos-arm64-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: velo-macos-arm64-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
